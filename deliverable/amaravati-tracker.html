<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0f1114;
  --bg-surface: #181b20;
  --bg-elevated: #1e2228;
  --bg-hover: #252a31;
  --border: #2a2f38;
  --border-light: #353b45;
  --text-primary: #e8e4dd;
  --text-secondary: #9a958d;
  --text-muted: #615d57;
  --accent-gold: #d4a857;
  --accent-gold-dim: #b8912e;
  --accent-gold-glow: rgba(212, 168, 87, 0.15);
  --cat-government: #e05555;
  --cat-road: #4a9eda;
  --cat-bridge: #e0943a;
  --cat-residential: #5bb868;
  --cat-commercial: #a07ad4;
  --cat-utility: #7a8899;
  --status-completed: #5bb868;
  --status-construction: #e0943a;
  --status-planned: #4a9eda;
  --status-stalled: #e05555;
  --sidebar-width: 380px;
  --topbar-height: 56px;
  --radius: 8px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

/* ── Top Bar ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-height);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
  gap: 16px;
}

.topbar-brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-shrink: 0;
}

.topbar-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem;
  color: var(--accent-gold);
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.topbar-subtitle {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
  white-space: nowrap;
}

.topbar-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

.filters {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  flex: 1;
  min-width: 0;
}

.filters::-webkit-scrollbar { display: none; }

.filter-btn {
  padding: 5px 14px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
  letter-spacing: 0.02em;
}

.filter-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-light);
  color: var(--text-primary);
}

.filter-btn.active {
  background: var(--accent-gold-glow);
  border-color: var(--accent-gold-dim);
  color: var(--accent-gold);
}

.filter-btn .dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
  position: relative;
  top: -0.5px;
}

.layer-toggle {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
}

.layer-btn {
  padding: 5px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.layer-btn:hover { color: var(--text-secondary); border-color: var(--border-light); }
.layer-btn.active { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }

/* ── Layout: Map + Sidebar ── */
.main-layout {
  position: fixed;
  top: var(--topbar-height);
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
}

.map-container {
  flex: 1;
  min-width: 0;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
}

.leaflet-tile-pane.satellite { filter: none; }
.leaflet-control-attribution { font-size: 9px !important; opacity: 0.5; }
.leaflet-control-zoom a {
  background: var(--bg-surface) !important;
  color: var(--text-secondary) !important;
  border-color: var(--border) !important;
}
.leaflet-control-zoom a:hover { background: var(--bg-elevated) !important; color: var(--text-primary) !important; }

/* ── Custom Markers ── */
.marker-icon {
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.9);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.marker-icon:hover {
  transform: scale(1.3);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.15);
}

/* ── Sidebar (always visible) ── */
.sidebar {
  width: var(--sidebar-width);
  height: 100%;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.1rem;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.sidebar-header .view-info {
  font-size: 0.72rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header .view-info .count {
  color: var(--accent-gold);
  font-weight: 700;
}

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.82rem;
  line-height: 1.6;
}

/* ── Location Group ── */
.loc-group {
  border-bottom: 1px solid var(--border);
}

.loc-group:last-child {
  border-bottom: none;
}

.loc-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px 8px;
  cursor: pointer;
}

.loc-group-header:hover {
  background: var(--bg-elevated);
}

.loc-group-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.loc-group-name {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--accent-gold);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.loc-group-status {
  font-size: 0.58rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 7px;
  border-radius: 100px;
  flex-shrink: 0;
}

/* ── News Article ── */
.news-article {
  display: flex;
  gap: 12px;
  padding: 10px 16px;
  text-decoration: none;
  color: inherit;
  transition: background var(--transition);
}

.news-article:hover {
  background: var(--bg-elevated);
}

.news-article-body {
  flex: 1;
  min-width: 0;
}

.news-article-source {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.news-article-source-name {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-secondary);
}

.news-article-title {
  font-size: 0.82rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text-primary);
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.news-article:hover .news-article-title {
  color: #8ab4f8;
}

.news-article-time {
  font-size: 0.65rem;
  color: var(--text-muted);
}

.news-article-thumb {
  width: 100px;
  height: 68px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-elevated);
}

/* ── Loading / Error ── */
.news-loading {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 0.75rem;
}

.news-loading-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border-light);
  border-top-color: var(--accent-gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.news-error {
  padding: 8px 16px;
  font-size: 0.72rem;
  color: var(--text-muted);
}

.news-fallback-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  margin: 4px 16px 10px;
  border-radius: var(--radius);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--accent-gold);
  text-decoration: none;
  font-size: 0.7rem;
  font-weight: 600;
  transition: all var(--transition);
}

.news-fallback-link:hover {
  background: var(--bg-hover);
  border-color: var(--accent-gold-dim);
}

/* ── Mobile ── */
@media (max-width: 768px) {
  .topbar-subtitle { display: none; }
  .topbar-divider:first-of-type { display: none; }
  .layer-toggle { display: none; }

  .main-layout {
    flex-direction: column;
  }

  .map-container {
    flex: 1;
  }

  .sidebar {
    width: 100%;
    height: 40vh;
    border-left: none;
    border-top: 1px solid var(--border);
  }
}
</style>

const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '&copy; Esri', maxZoom: 19
});

streetLayer.addTo(map);
let currentTileLayer = 'street';

document.querySelectorAll('.layer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const layer = btn.dataset.layer;
    if (layer === currentTileLayer) return;
    currentTileLayer = layer;
    document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (layer === 'satellite') {
      map.removeLayer(streetLayer);
      satelliteLayer.addTo(map);
      document.querySelector('.leaflet-tile-pane').classList.add('satellite');
    } else {
      map.removeLayer(satelliteLayer);
      streetLayer.addTo(map);
      document.querySelector('.leaflet-tile-pane').classList.remove('satellite');
    }
  });
});

// ══════════════════════════════════════════════════════════
//  MARKERS & LAYER GROUPS
// ══════════════════════════════════════════════════════════
const layerGroups = {};

Object.keys(CATEGORY_COLORS).forEach(cat => {
  layerGroups[cat] = L.layerGroup().addTo(map);
});

LOCATIONS.forEach(loc => {
  const color = CATEGORY_COLORS[loc.category];
  const size = 12;
  const icon = L.divIcon({
    className: '',
    html: `<div class="marker-icon" style="width:${size}px;height:${size}px;background:${color};" data-id="${loc.id}"></div>`,
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2]
  });
  const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(layerGroups[loc.category]);
  marker.on('click', () => {
    map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), 14), { animate: true });
  });
  loc._marker = marker;
});

// ══════════════════════════════════════════════════════════
//  NEWS FETCHING — Google News RSS via CORS proxy
// ══════════════════════════════════════════════════════════
const newsCache = new Map();
const CACHE_TTL = 10 * 60 * 1000;
const PROXY_BASE = 'https://corsproxy.io/?';

function buildProxiedRssUrl(keywords) {
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(keywords)}&hl=en-IN&gl=IN&ceid=IN:en`;
  return PROXY_BASE + encodeURIComponent(rssUrl);
}

function parseRssXml(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const items = doc.querySelectorAll('item');
  const articles = [];

  items.forEach((item, i) => {
    if (i >= 5) return;

    const title = item.querySelector('title')?.textContent || '';
    const link = item.querySelector('link')?.textContent || '';
    const pubDate = item.querySelector('pubDate')?.textContent || '';
    const source = item.querySelector('source')?.textContent || '';

    const descHtml = item.querySelector('description')?.textContent || '';
    let thumb = '';
    const imgMatch = descHtml.match(/<img[^>]+src="([^"]+)"/);
    if (imgMatch) thumb = imgMatch[1];

    const cleanTitle = source && title.endsWith(' - ' + source)
      ? title.slice(0, -((' - ' + source).length))
      : title;

    articles.push({ title: cleanTitle, link, pubDate, source, thumb });
  });

  return articles;
}

async function fetchNews(keywords) {
  const cached = newsCache.get(keywords);
  if (cached && (Date.now() - cached.fetchedAt) < CACHE_TTL) {
    return cached.articles;
  }

  const url = buildProxiedRssUrl(keywords);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

  const xmlText = await resp.text();
  const articles = parseRssXml(xmlText);

  newsCache.set(keywords, { articles, fetchedAt: Date.now() });
  return articles;
}

function timeAgo(dateStr) {
  const now = Date.now();
  const then = new Date(dateStr).getTime();
  const diff = now - then;
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'Yesterday';
  if (days < 7) return `${days}d ago`;
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ══════════════════════════════════════════════════════════
//  SIDEBAR — viewport-driven live news feed
// ══════════════════════════════════════════════════════════
const sidebarBody = document.getElementById('sidebarBody');
const visibleCountEl = document.getElementById('visibleCount');
let activeFilter = 'all';
let renderGeneration = 0;

function getVisibleLocations() {
  const bounds = map.getBounds();
  return LOCATIONS.filter(loc => {
    if (activeFilter !== 'all' && loc.category !== activeFilter) return false;
    return bounds.contains([loc.lat, loc.lng]);
  });
}

function renderArticleHtml(article) {
  const thumbHtml = article.thumb
    ? `<img class="news-article-thumb" src="${article.thumb}" alt="" loading="lazy" onerror="this.remove()">`
    : '';

  return `
    <a class="news-article" href="${article.link}" target="_blank" rel="noopener">
      <div class="news-article-body">
        <div class="news-article-source">
          <span class="news-article-source-name">${article.source}</span>
        </div>
        <div class="news-article-title">${article.title}</div>
        <div class="news-article-time">${timeAgo(article.pubDate)}</div>
      </div>
      ${thumbHtml}
    </a>
  `;
}

function renderSidebar() {
  renderGeneration++;
  const gen = renderGeneration;

  const visible = getVisibleLocations();
  visibleCountEl.textContent = visible.length;

  if (visible.length === 0) {
    sidebarBody.innerHTML = `<div class="sidebar-empty">No locations in the current view.<br>Zoom out or pan the map to see locations.</div>`;
    return;
  }

  const statusOrder = { under_construction: 0, planned: 1, stalled: 2, completed: 3 };
  visible.sort((a, b) => (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9));

  sidebarBody.innerHTML = visible.map(loc => {
    const catColor = CATEGORY_COLORS[loc.category];
    const st = STATUS_CONFIG[loc.status];
    const newsUrl = `https://www.google.com/search?q=${encodeURIComponent(loc.searchKeywords)}&tbm=nws`;

    return `
      <div class="loc-group" data-id="${loc.id}">
        <div class="loc-group-header" data-loc-id="${loc.id}">
          <span class="loc-group-dot" style="background:${catColor};"></span>
          <span class="loc-group-name">${loc.name}</span>
          <span class="loc-group-status" style="background:${st.color}18;color:${st.color};">${st.label}</span>
        </div>
        <div class="loc-group-articles" id="articles-${loc.id}">
          <div class="news-loading">
            <div class="news-loading-spinner"></div>
            Loading news...
          </div>
        </div>
        <a class="news-fallback-link" href="${newsUrl}" target="_blank" rel="noopener">
          More on Google News &rarr;
        </a>
      </div>
    `;
  }).join('');

  sidebarBody.querySelectorAll('.loc-group-header').forEach(el => {
    el.addEventListener('click', () => {
      const loc = LOCATIONS.find(l => l.id === el.dataset.locId);
      if (loc) map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), 15), { animate: true });
    });
  });

  visible.forEach(loc => {
    fetchNews(loc.searchKeywords)
      .then(articles => {
        if (gen !== renderGeneration) return;
        const container = document.getElementById(`articles-${loc.id}`);
        if (!container) return;

        if (articles.length === 0) {
          container.innerHTML = `<div class="news-error">No recent news found.</div>`;
        } else {
          container.innerHTML = articles.map(renderArticleHtml).join('');
        }
      })
      .catch(() => {
        if (gen !== renderGeneration) return;
        const container = document.getElementById(`articles-${loc.id}`);
        if (!container) return;
        container.innerHTML = `<div class="news-error">Could not load news.</div>`;
      });
  });
}

let renderTimeout = null;
function debouncedRender() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(renderSidebar, 300);
}

map.on('moveend', debouncedRender);
map.on('zoomend', debouncedRender);

renderSidebar();

// ══════════════════════════════════════════════════════════
//  CATEGORY FILTERS
// ══════════════════════════════════════════════════════════
document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;

  const filter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = filter;

  Object.entries(layerGroups).forEach(([cat, group]) => {
    if (filter === 'all' || filter === cat) {
      map.addLayer(group);
    } else {
      map.removeLayer(group);
    }
  });

  renderSidebar();
});
</script>
</body>
</html>
